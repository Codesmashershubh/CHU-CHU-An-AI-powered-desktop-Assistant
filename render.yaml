# Render Blueprint — deploys Chu Chu's backend + AI engine as a single free
# web service. In the Render dashboard: New + -> Blueprint -> point at this repo.
#
# Deliberately does NOT declare a `databases:` block. Render's free Postgres
# expires 30 days after creation, which would be a nasty surprise for an app
# that's supposed to remember your notes. Instead the app defaults to a local
# SQLite file (fine for trying things out, resets on redeploy) and you can
# point DATABASE_URL at a free, non-expiring Postgres instance (Neon,
# Supabase, ...) yourself once you have one — see docs/DEPLOYMENT.md.

services:
  - type: web
    name: chu-chu-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: APP_NAME
        value: Chu Chu
      - key: ASSISTANT_NAME
        value: Chu Chu

      # Auto-generated by Render — copy this value into your Electron app's
      # settings after the first deploy so the two sides match.
      - key: APP_SHARED_SECRET
        generateValue: true

      - key: RATE_LIMIT_REQUESTS
        value: "30"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"

      # Required — free, no credit card: https://console.groq.com/keys
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3-turbo

      # Optional fallback providers — leave blank in the dashboard to skip.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: meta-llama/llama-3.3-70b-instruct:free
      - key: AI_PROVIDER_ORDER
        value: groq,gemini,openrouter
      - key: AI_TEMPERATURE
        value: "0.6"
      - key: AI_MAX_TOKENS
        value: "1024"
      - key: AI_REQUEST_TIMEOUT_SECONDS
        value: "45"

      # Optional — free web search, 1,000/mo, no card: https://app.tavily.com
      - key: TAVILY_API_KEY
        sync: false

      # Not set here on purpose — see the comment at the top of this file.
      # Add DATABASE_URL yourself in the dashboard once you have a free
      # Postgres instance, if you want notes/reminders to survive redeploys.
